services:
  api:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      FLASK_HOST: 0.0.0.0
      FLASK_DEBUG: "false"
      PORT: "8080"
      THINGSPEAK_API_BASE_URL: https://api.thingspeak.com
      THINGSPEAK_CHANNEL_ID: "270748"
      ALPACA_BASE: http://host.docker.internal:32323/api/v1/telescope/0
      ASCOM_BASE_URL: http://host.docker.internal:32323
      CLIENT_ID: "1"
      CAPTURES_DIR: /data/captures
    restart: unless-stopped
    networks:
      - cse3cap-rsdcc
    volumes:
      - ./app/oapi.yaml:/app/app/oapi.yaml:ro
      - ./captures:/data/captures   # NEW - persist snapshots on host

  frontend:
    build:
      context: ../client
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    environment:
      VITE_API_URL: http://localhost:8080
    networks:
      - cse3cap-rsdcc
    restart: unless-stopped
    depends_on:
      - ffmpeg_telescope
      - ffmpeg_telescope_view

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx
    ports:
      - "1935:1935"
      - "8888:8888"
      - "8889:8889"
      - "8554:8554"
      - "8000:8000/udp"
      - "8001:8001/udp"
      - "8189:8189/udp"
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
    networks:
      - cse3cap-rsdcc
    restart: unless-stopped

  otel-lgtm:
    image: grafana/otel-lgtm:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SMTP_ENABLED=true
      - GF_SMTP_HOST=sandbox.smtp.mailtrap.io:2525 
      - GF_SMTP_USER=00a9ce522425fd
      - GF_SMTP_PASSWORD=44c848846b9607 
      - GF_SMTP_SKIP_VERIFY=true
      - GF_SMTP_FROM_ADDRESS=grafana@cse3cap-rsdcc.com
    volumes:
      - lgtm-data:/data
    networks:
      - cse3cap-rsdcc
    restart: unless-stopped

  ffmpeg_telescope:
    image: jrottenberg/ffmpeg:5.1-ubuntu
    depends_on:
      - mediamtx
    volumes:
      - ./example1-video.mp4:/media/example1-video.mp4:ro
    command: >
      -re -stream_loop -1 -i /media/example1-video.mp4
      -c:v libx264 -preset veryfast -tune zerolatency -b:v 4M -maxrate 4M -bufsize 2M -g 30 -sc_threshold 0
      -c:a aac -ar 48000
      -f mpegts "srt://mediamtx:8890?mode=caller&streamid=publish:telescope-camera"
    restart: unless-stopped
    networks:
      - cse3cap-rsdcc

  ffmpeg_allsky:
    image: jrottenberg/ffmpeg:5.1-ubuntu
    depends_on:
      - mediamtx
    volumes:
      - ./example1-video.mp4:/media/example1-video.mp4:ro
    command: >
      -re -stream_loop -1 -i /media/example1-video.mp4
      -c:v libx264 -preset veryfast -tune zerolatency -b:v 2.5M -maxrate 2.5M -bufsize 1.25M -g 30 -sc_threshold 0
      -c:a aac -ar 48000
      -f mpegts "srt://mediamtx:8890?mode=caller&streamid=publish:allsky"
    restart: unless-stopped
    networks:
      - cse3cap-rsdcc

  ffmpeg_telescope_view:
    image: jrottenberg/ffmpeg:5.1-ubuntu
    depends_on:
      - mediamtx
      - ffmpeg_telescope
    volumes:
      - ./example-video.mp4:/media/example-video.mp4:ro
    command: >
      -re -stream_loop -1 -i /media/example-video.mp4
      -c:v libx264 -preset veryfast -tune zerolatency -b:v 3M -maxrate 3M -bufsize 1.5M -g 30 -sc_threshold 0
      -c:a aac -ar 48000
      -f mpegts "srt://mediamtx:8890?mode=caller&streamid=publish:telescope-view"
    restart: unless-stopped
    networks:
      - cse3cap-rsdcc

volumes:
  lgtm-data:

networks:
  cse3cap-rsdcc:
    driver: bridge
